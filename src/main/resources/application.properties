spring.application.name=user-service
server.port=8081

# Connect to VM's MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:user_service}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
