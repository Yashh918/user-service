spring.application.name=user-service
server.port=8081

# Connect to VM's MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:user_service}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username = ${MYSQL_USERNAME:yashh}
spring.datasource.password = ${MYSQL_PASSWORD:mysql}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

#JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:}